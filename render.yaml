services:
  - type: web
    name: swimdiary-web
    env: docker
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOW_FREE_EXPORTS
        value: "false"
      - key: ALLOW_DEV_VIP
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: swimdiary-db
          property: connectionString

databases:
  - name: swimdiary-db
    plan: basic-256mb
